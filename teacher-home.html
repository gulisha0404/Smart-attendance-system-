<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Teacher Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Reuse your existing styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="login-wrapper">
    <div class="login-card">
      <header class="card-header">
        <h1 class="title">Teacher Dashboard</h1>
        <div class="subtitle" id="teacherEmail"></div>
      </header>

      <section class="card-body">
        <p style="font-size:14px; margin-bottom:16px;">
          Welcome. From here you will be able to view students, achievements, and reports.
        </p>

        <div style="display:grid; gap:12px;">
          <button class="btn-login" id="viewStudentsBtn">
            <i class="fa-solid fa-users"></i> View Students
          </button>

          <button class="btn-login" id="viewAchievementsBtn">
            <i class="fa-solid fa-trophy"></i> View Achievements
          </button>

          <button class="btn-login" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
          </button>
        </div>
      </section>
    </div>
  </main>

  <script src="teacher-home.js"></script>
</body>
</html>
